<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#ff5d8f">
  <meta name="description" content="JAYDEN × CELINE 的马来西亚美食、奶茶与甜点选择转盘">
  <title>JAYDEN × CELINE 今天吃什么？</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="noise" aria-hidden="true"></div>
  <main class="app-shell">
    <header class="hero">
      <div class="photo-frame">
        <div class="photo-fallback" aria-hidden="true">
          <strong>J <span>♥</span> C</strong>
          <small>OUR PHOTO</small>
        </div>
        <img id="couple-photo" src="couple-photo.jpg" alt="JAYDEN 和 CELINE 的合照" onerror="this.hidden=true">
        <div class="photo-tape" aria-hidden="true"></div>
        <div class="photo-caption">JAYDEN &amp; CELINE · 吃饭搭子永久会员</div>
      </div>

      <div class="eyebrow">THE VERY SERIOUS DINNER COMMITTEE</div>
      <h1><span>JAYDEN</span><b>×</b><span>CELINE</span></h1>
      <p>今天吃喝什么？</p>
      <div class="status-pill">专治：“随便啊，我都可以”</div>
      <a class="photo-menu-link" href="menu.html">
        <span>📸</span>
        <strong>不想转？看照片自己选</strong>
        <small>打开图片菜单 →</small>
      </a>
    </header>

    <section class="filter-card" aria-labelledby="filter-title">
      <div class="section-heading">
        <div>
          <span class="step">01</span>
          <h2 id="filter-title">先缩小案发范围</h2>
        </div>
        <span id="option-count" class="option-count"></span>
      </div>
      <div id="filters" class="filters" role="group" aria-label="食物分类筛选"></div>
      <p id="pool-note" class="pool-note"></p>
    </section>

    <section class="wheel-section" aria-labelledby="wheel-title">
      <div class="section-heading wheel-heading">
        <div>
          <span class="step">02</span>
          <h2 id="wheel-title">交给命运，禁止反悔*</h2>
        </div>
      </div>

      <div class="wheel-stage">
        <div class="pointer" aria-hidden="true"><span></span></div>
        <div id="wheel-wrap" class="wheel-wrap">
          <canvas id="wheel" width="760" height="760" aria-label="食物选择转盘"></canvas>
          <div class="wheel-hub" aria-hidden="true"><span>选</span></div>
        </div>
      </div>

      <button id="spin-button" class="spin-button" type="button">
        <span class="button-main">转！现在！马上！</span>
        <span class="button-sub">让宇宙替我们背锅</span>
      </button>
      <p class="fine-print">* 若 CELINE 皱眉，本条款自动失效。</p>
    </section>

    <section id="result-card" class="result-card" aria-live="polite" aria-hidden="true">
      <div class="result-stamp">命运的安排</div>
      <p id="result-category" class="result-category"></p>
      <h2 id="result-name"></h2>
      <p id="result-copy" class="result-copy"></p>
      <div class="result-actions">
        <button id="accept-button" class="accept-button" type="button">好，就这个！</button>
        <button id="retry-button" class="retry-button" type="button">她说不行，再转一次</button>
      </div>
      <p id="accepted-message" class="accepted-message" hidden>成交 🤝 请 JAYDEN 立即开始觅食。</p>
    </section>

    <footer>
      <p>Made with hunger, chaos &amp; a little bit of love.</p>
      <span>J × C · MALAYSIA</span>
    </footer>
  </main>

  <div id="confetti-layer" class="confetti-layer" aria-hidden="true"></div>
  <script src="app.js"></script>
</body>
</html>
